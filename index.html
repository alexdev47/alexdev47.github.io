<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>Telegram Mini Apps Vanilla JS Sample App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div>
        <h2 class="feelings">What are you feeling today?</h2>
    </div>

    <div class="container">
        <input type="date" class="date">
        <input type="submit" value="Set Date" class="setDateBtn">
    </div>

    <div class="mainTextContainer">
        <textarea class="textContainer"></textarea>
    </div>

    <div class="divSafeBtn">
        <input onclick="popUp()" type="submit" value="Save" class="safeBtn">
        <input type="submit" value="Delete" class="deleteBtn">
    </div>

</body>

<script src="app.js">
</script>



</html>
