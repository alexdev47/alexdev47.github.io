<!DOCTYPE html>
<html>
<head>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div>
        <h1 class="greatings">Hi, User</h1>
        <h2 class="feelings">What are you feeling today?</h2>
    </div>

    <div class="container">
        <input type="date" class="date">
        <input type="submit" value="Set Date" class="setDateBtn">
    </div>

    <div class="mainTextContainer">
        <textarea class="textContainer"></textarea>
    </div>

    <div class="divSafeBtn">
        <input onclick="WebApp.showAlert('Saved')" type="submit" value="Save" class="safeBtn">
        <input type="submit" value="Delete" class="deleteBtn">
    </div>

</body>

<script src="app.js">
</script>



</html>
